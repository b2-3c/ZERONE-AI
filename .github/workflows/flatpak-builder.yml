name: Flatpak Build

on:
  push:
    branches: [ master ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من تبويب Actions

jobs:
  flatpak:
    name: "Flatpak Build & Artifact"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Flatpak build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: zeroneai.flatpak
          manifest-path: com.zeroneai.app.json # تأكد أن هذا الملف موجود في المستودع
          cache-key: flatpak-builder-${{ github.sha }}
          
      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: zeroneai-flatpak-package
          path: zeroneai.flatpak
