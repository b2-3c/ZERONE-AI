name: Rebuild Locales

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    # --- هذا الجزء ضروري جداً لحل مشكلة 403 ---
    permissions:
      contents: write 
    # ---------------------------------------
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # تحديث للنسخة v4
        with:
          fetch-depth: 0

      - name: Rebuild locales
        run: |
          sudo apt update
          sudo apt install -y gettext
          mkdir -p po # التأكد من وجود المجلد
          (
            find src -type f -name "*.py" -exec grep -lE '_\(|N\(_' {} \;
            find data -type f \( -name "*.xml" -o -name "*.in" \)
          ) > po/POTFILES
          xgettext -o po/zeroneai.pot $(cat po/POTFILES)
          cd po
          # فحص إذا كانت هناك ملفات .po قبل البدء لتجنب الخطأ
          for file in *.po; do
              [ -e "$file" ] || continue
              msgmerge -U "$file" zeroneai.pot
          done
          rm -f *~
          cd ..

      - name: Commit and Push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Automated changes by github actions"
            # استخدام التوكن الصريح لضمان الصلاحية
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
